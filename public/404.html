<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Sleeper Scout</title>
    <script>
        // SPA redirect for GitHub Pages (github.com/rafgraph/spa-github-pages)
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>

<body></body>

</html>
